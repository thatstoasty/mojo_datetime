name: Run the testing suite

on:
  workflow_call:

jobs:
  test-linux:
    name: Run tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.67.2
          cache: true

      - name: Run the test suite
        run: pixi run tests

  test-macos:
    name: Run tests
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@main
        with:
          pixi-version: v0.67.2
          cache: true

      - name: Run the test suite
        run: pixi run tests